name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python scripts/train.py

      - name: Run evaluation
        run: python scripts/evaluate.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report-py${{ matrix.python-version }}
          path: reports/evaluation.md

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t invoice-classifier:latest .
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name test-api invoice-classifier:latest
          sleep 12
          curl -sf http://localhost:8000/api/v1/health
          curl -sf -X POST http://localhost:8000/api/v1/predict \
            -H "Content-Type: application/json" \
            -d '{"text":"AWS monthly cloud hosting bill"}' | grep "Cloud/Software"
          docker stop test-api
